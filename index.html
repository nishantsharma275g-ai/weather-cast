<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WeatherCast | Live Weather Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="app">
      <!-- ================= Header ================= -->

      <header class="header">
        <h1 class="logo">WeatherCast</h1>

        <p class="subtitle">Get live weather updates anywhere 🌍</p>
      </header>

      <!-- ================= Search ================= -->

      <section class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name..."
            autocomplete="off"
          />
          <button id="searchBtn">Search</button>
        </div>

        <button id="locationBtn">📍 Use My Location</button>
      </section>

      <!-- ================= Weather ================= -->

      <section class="weather-card">
        <img id="weatherIcon" src="" alt="Weather Icon" />
        <h2 id="temperature">--°</h2>
        <h3 id="cityName">Search a city</h3>
        <p id="condition">Weather Condition</p>
        <p id="lastUpdated">Last updated: --</p>
      </section>

      <!-- ================= Details ================= -->

      <section class="weather-details">
        <article class="detail-card">
          <h4>Humidity</h4>
          <p id="humidity">--%</p>
        </article>

        <article class="detail-card">
          <h4>Wind Speed</h4>
          <p id="wind">-- km/h</p>
        </article>

        <article class="detail-card">
          <h4>Feels Like</h4>
          <p id="feelsLike">--°</p>
        </article>

        <article class="detail-card">
          <h4>Pressure</h4>
          <p id="pressure">----</p>
        </article>

        <article class="detail-card">
          <h4>UV Index</h4>
          <p id="uv">--</p>
        </article>

        <article class="detail-card">
          <h4>Visibility</h4>
          <p id="visibility">-- km</p>
        </article>
      </section>

      <!-- ================= Status ================= -->

      <section class="status-area">
        <p id="loadingMessage"></p>

        <p id="errorMessage"></p>

        <p id="cacheMessage"></p>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
